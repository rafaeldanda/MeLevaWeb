<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me Leva</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<!-- 🔥 MAPBOX (FALTAVA ISSO) -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet"/>

</head>

<body>

<div id="app">


<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>

    <input id="usuario" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">

    <button id="btnMotorista">Login Motorista</button>
    <button id="btnPassageiro">Login Passageiro</button>
</div>

<!-- PASSAGEIRO -->
<div id="passageiro" class="hidden">
    <h2>Solicitar Corrida</h2>
<div id="map" style="height:300px;"></div>
    <input id="origem" placeholder="Origem">
    <input id="destino" placeholder="Destino">

    <select id="tipo">
        <option value="simples">Simples</option>
        <option value="confort">Confort</option>
        <option value="black">Black</option>
    </select>

    <button id="btnCorrida">Chamar</button>
</div>

<!-- MOTORISTA -->
<div id="motorista" class="hidden">
    <h2>Motorista Online</h2>
    <p id="statusGPS">Iniciando GPS...</p>
</div>


</div>

<script src="app.js" defer></script>

</body>
</html>
